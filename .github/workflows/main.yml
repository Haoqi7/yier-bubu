name: Build and Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            build_cmd: npm run build:win
            artifact_name: win-installer
            artifact_glob: dist/*.exe
          - os: macos-latest
            build_cmd: npm run build:mac
            artifact_name: mac-installer
            artifact_glob: dist/*.dmg
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.electron-cache
      electron_config_cache: ${{ github.workspace }}/.electron-cache

    steps:
      - uses: actions/checkout@v4

      - name: Download and extract assets
        run: |
          curl -L -o assets.zip "https://github.com/Haoqi7/yier-bubu/releases/download/v1.0/assets.zip"
          mkdir -p _assets_tmp
          unzip -o assets.zip -d _assets_tmp
          if [ -d "_assets_tmp/assets" ]; then
            mv _assets_tmp/assets ./assets
          else
            mkdir -p assets
            cp -r _assets_tmp/* assets/
          fi
          rm -rf _assets_tmp assets.zip
        shell: bash

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.electron-cache
          key: electron-${{ matrix.os }}-28

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install
        shell: bash

      - name: Build
        run: ${{ matrix.build_cmd }} --publish never
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate timestamp
        id: time
        run: echo "TIMESTAMP=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ steps.time.outputs.TIMESTAMP }}"
          tag_name: "v${{ steps.time.outputs.TIMESTAMP }}"
          files: |
            artifacts/win-installer/*
            artifacts/mac-installer/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
