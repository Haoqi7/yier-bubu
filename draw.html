<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      cursor: crosshair;
      overflow: hidden;
      background: rgba(0,0,0,0.25);
      user-select: none;
    }
    #hint {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.75); color: #fff;
      padding: 16px 32px; border-radius: 14px;
      font-size: 18px; font-family: -apple-system, 'Microsoft YaHei', sans-serif;
      pointer-events: none; text-align: center;
      line-height: 1.8;
    }
    #hint small { display: block; font-size: 13px; opacity: 0.7; margin-top: 4px; }
    #rect {
      position: fixed;
      border: 3px dashed #f06292;
      background: rgba(240, 98, 146, 0.08);
      pointer-events: none;
      display: none;
      z-index: 10;
    }
    #sizeLabel {
      position: fixed;
      background: rgba(240,98,146,0.9); color: #fff;
      padding: 4px 10px; border-radius: 6px;
      font-size: 12px; font-family: monospace;
      pointer-events: none; display: none; z-index: 11;
      white-space: nowrap;
    }
    #cancelBtn {
      position: fixed; top: 20px; right: 20px;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,0.9); border: none;
      font-size: 20px; cursor: pointer; z-index: 20;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      transition: all 0.2s;
    }
    #cancelBtn:hover { background: #e57373; color: #fff; }
  </style>
</head>
<body>
  <div id="hint">
    拖拽鼠标绘制窗口区域
    <small>松开鼠标确认 · 按 ESC 取消</small>
  </div>
  <div id="rect"></div>
  <div id="sizeLabel"></div>
  <button id="cancelBtn">✕</button>

  <script>
    const api = window.electronAPI;
    const rect = document.getElementById('rect');
    const label = document.getElementById('sizeLabel');
    const hint = document.getElementById('hint');
    let startX = 0, startY = 0, dragging = false;

    document.addEventListener('mousedown', (e) => {
      if (e.target.id === 'cancelBtn') return;
      dragging = true;
      startX = e.screenX;
      startY = e.screenY;
      hint.style.display = 'none';
      rect.style.display = 'block';
      label.style.display = 'block';
    });

    document.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const x = Math.min(startX, e.screenX);
      const y = Math.min(startY, e.screenY);
      const w = Math.abs(e.screenX - startX);
      const h = Math.abs(e.screenY - startY);
      rect.style.left = x + 'px';
      rect.style.top = y + 'px';
      rect.style.width = w + 'px';
      rect.style.height = h + 'px';
      label.textContent = w + ' × ' + h;
      label.style.left = (x + w + 6) + 'px';
      label.style.top = (y + h + 6) + 'px';
    });

    document.addEventListener('mouseup', (e) => {
      if (!dragging) return;
      dragging = false;
      const w = Math.abs(e.screenX - startX);
      const h = Math.abs(e.screenY - startY);
      if (w < 50 || h < 50) {
        hint.style.display = '';
        rect.style.display = 'none';
        label.style.display = 'none';
        return;
      }
      const x = Math.min(startX, e.screenX);
      const y = Math.min(startY, e.screenY);
      if (api) api.drawConfirm(x, y, w, h);
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && api) api.drawCancel();
    });

    document.getElementById('cancelBtn').addEventListener('click', () => {
      if (api) api.drawCancel();
    });
  </script>
</body>
</html>
